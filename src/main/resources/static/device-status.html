<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设备最新数据状态</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #64748b;
            --line: #dbe3ef;
            --online: #0f8f5f;
            --stale: #b45309;
            --empty: #64748b;
            --disabled: #8b5cf6;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 14px;
        }

        header {
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }

        .shell {
            width: min(1280px, calc(100vw - 32px));
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 0;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
            text-align: right;
            line-height: 1.6;
        }

        main {
            padding: 18px 0 32px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .summary-item {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
        }

        .summary-label {
            color: var(--muted);
            font-size: 12px;
        }

        .summary-value {
            margin-top: 4px;
            font-size: 24px;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 14px;
        }

        input,
        select,
        button {
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        input {
            min-width: 260px;
            padding: 0 10px;
        }

        select {
            padding: 0 8px;
        }

        button {
            cursor: pointer;
            padding: 0 12px;
            background: #0f766e;
            border-color: #0f766e;
            color: #fff;
            font-weight: 600;
        }

        button:disabled {
            cursor: wait;
            opacity: .7;
        }

        .table-wrap {
            overflow-x: auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .device-code {
            font-weight: 700;
            white-space: nowrap;
        }

        .muted {
            color: var(--muted);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            min-width: 58px;
            justify-content: center;
            height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .ONLINE {
            color: var(--online);
            background: #dcfce7;
        }

        .STALE {
            color: var(--stale);
            background: #fef3c7;
        }

        .NO_DATA {
            color: var(--empty);
            background: #e2e8f0;
        }

        .DISABLED {
            color: var(--disabled);
            background: #ede9fe;
        }

        .ERROR {
            color: var(--danger);
            background: #fee2e2;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: 6px 12px;
            min-width: 280px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px dashed #e5e7eb;
        }

        .data-key {
            color: var(--muted);
            white-space: nowrap;
        }

        .data-value {
            font-weight: 600;
            text-align: right;
            overflow-wrap: anywhere;
        }

        .empty {
            padding: 42px;
            text-align: center;
            color: var(--muted);
        }

        .error {
            color: var(--danger);
            font-weight: 600;
        }

        @media (max-width: 760px) {
            .shell {
                width: min(100vw - 20px, 1280px);
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .meta {
                text-align: left;
            }

            .summary {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            input,
            select,
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="shell topbar">
        <h1>设备最新数据状态</h1>
        <div class="meta">
            <div>接口: /api/device-status</div>
            <div id="last-refresh">尚未刷新</div>
        </div>
    </div>
</header>

<main class="shell">
    <section class="summary" aria-label="状态汇总">
        <div class="summary-item">
            <div class="summary-label">设备总数</div>
            <div class="summary-value" id="count-total">0</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">正常</div>
            <div class="summary-value" id="count-online">0</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">超时</div>
            <div class="summary-value" id="count-stale">0</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">暂无数据</div>
            <div class="summary-value" id="count-empty">0</div>
        </div>
    </section>

    <section class="toolbar" aria-label="筛选">
        <input id="keyword" type="search" placeholder="搜索设备编号、监测内容、类型">
        <select id="status-filter" aria-label="状态筛选">
            <option value="">全部状态</option>
            <option value="ONLINE">正常</option>
            <option value="STALE">超时</option>
            <option value="NO_DATA">暂无数据</option>
            <option value="DISABLED">停用</option>
        </select>
        <button id="refresh-button" type="button">刷新</button>
    </section>

    <section class="table-wrap" aria-label="设备列表">
        <table>
            <thead>
            <tr>
                <th>状态</th>
                <th>设备编号</th>
                <th>监测内容</th>
                <th>类型</th>
                <th>最新数据</th>
                <th>数据时间</th>
                <th>接收时间</th>
                <th>接入</th>
            </tr>
            </thead>
            <tbody id="device-rows"></tbody>
        </table>
        <div id="empty-state" class="empty" hidden>暂无设备数据</div>
    </section>
</main>

<script>
    const state = {
        devices: [],
        loading: false,
    };

    const fields = {
        total: document.getElementById("count-total"),
        online: document.getElementById("count-online"),
        stale: document.getElementById("count-stale"),
        empty: document.getElementById("count-empty"),
        lastRefresh: document.getElementById("last-refresh"),
        keyword: document.getElementById("keyword"),
        statusFilter: document.getElementById("status-filter"),
        refreshButton: document.getElementById("refresh-button"),
        rows: document.getElementById("device-rows"),
        emptyState: document.getElementById("empty-state"),
    };

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function formatValue(value) {
        if (value === null || value === undefined || value === "") {
            return "-";
        }
        return escapeHtml(value);
    }

    function renderLatestData(device) {
        const data = device.latestData || {};
        const entries = Object.entries(data);
        if (entries.length === 0) {
            return '<span class="muted">暂无</span>';
        }
        return `<div class="data-grid">${entries.map(([key, value]) => `
            <div class="data-item">
                <span class="data-key">${escapeHtml(key)}</span>
                <span class="data-value">${formatValue(value)}</span>
            </div>
        `).join("")}</div>`;
    }

    function matchesFilter(device) {
        const keyword = fields.keyword.value.trim().toLowerCase();
        const status = fields.statusFilter.value;
        if (status && device.status !== status) {
            return false;
        }
        if (!keyword) {
            return true;
        }
        const searchable = [
            device.deviceCode,
            device.monitoringContent,
            device.deviceType,
            device.deviceTypeName,
            device.remoteDeviceId,
            device.networkGatewayType,
        ].join(" ").toLowerCase();
        return searchable.includes(keyword);
    }

    function renderSummary() {
        fields.total.textContent = state.devices.length;
        fields.online.textContent = state.devices.filter(item => item.status === "ONLINE").length;
        fields.stale.textContent = state.devices.filter(item => item.status === "STALE").length;
        fields.empty.textContent = state.devices.filter(item => item.status === "NO_DATA").length;
    }

    function renderRows() {
        const visibleDevices = state.devices.filter(matchesFilter);
        fields.emptyState.hidden = visibleDevices.length > 0;
        fields.rows.innerHTML = visibleDevices.map(device => `
            <tr>
                <td>
                    <span class="pill ${escapeHtml(device.status || "NO_DATA")}">${escapeHtml(device.statusText || "-")}</span>
                    <div class="muted">${escapeHtml(device.message || "")}</div>
                </td>
                <td>
                    <div class="device-code">${escapeHtml(device.deviceCode || "-")}</div>
                    <div class="muted">${escapeHtml(device.remoteDeviceId || "")}</div>
                </td>
                <td>${formatValue(device.monitoringContent)}</td>
                <td>
                    <div>${escapeHtml(device.deviceType || "-")}</div>
                    <div class="muted">${escapeHtml(device.deviceTypeName || "")}</div>
                </td>
                <td>${renderLatestData(device)}</td>
                <td>${formatValue(device.dataTime)}</td>
                <td>${formatValue(device.receivedAt)}</td>
                <td>
                    <div>${escapeHtml(device.networkGatewayType || "-")}</div>
                    <div class="muted">${device.port ? `端口 ${escapeHtml(device.port)}` : ""}</div>
                    <div class="muted">${device.frequency ? `${escapeHtml(device.frequency)} 秒` : ""}</div>
                </td>
            </tr>
        `).join("");
    }

    function render() {
        renderSummary();
        renderRows();
    }

    async function loadDeviceStatus() {
        state.loading = true;
        fields.refreshButton.disabled = true;
        fields.refreshButton.textContent = "刷新中";
        try {
            const response = await fetch("/api/device-status", {cache: "no-store"});
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            state.devices = await response.json();
            fields.lastRefresh.innerHTML = `刷新时间: ${escapeHtml(new Date().toLocaleString())}`;
        } catch (error) {
            fields.lastRefresh.innerHTML = `<span class="error">刷新失败: ${escapeHtml(error.message)}</span>`;
        } finally {
            state.loading = false;
            fields.refreshButton.disabled = false;
            fields.refreshButton.textContent = "刷新";
            render();
        }
    }

    fields.keyword.addEventListener("input", renderRows);
    fields.statusFilter.addEventListener("change", renderRows);
    fields.refreshButton.addEventListener("click", loadDeviceStatus);

    loadDeviceStatus();
    window.setInterval(loadDeviceStatus, 10000);
</script>
</body>
</html>
